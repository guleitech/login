# wrangler.toml
# Cloudflare Pages 配置文件
# 注意：JWT_SECRET 等敏感变量请在 Cloudflare Dashboard > Pages > Settings > Environment variables 中配置
# 不要在此文件中写入密钥值，wrangler.toml 的 [vars] 会覆盖 Dashboard 配置

name = "cloudflare-auth-system"
compatibility_date = "2026-07-03"
compatibility_flags = ["nodejs_compat_v2"]

# D1 数据库绑定
# 请将 database_id 替换为你的实际 D1 数据库 ID（在 CF Dashboard > D1 中查看）
[[d1_databases]]
binding = "DB"
database_name = "user_auth"
database_id = "a7f5d69f-0c11-4a85-89e3-00dde566ea93"
