# Cloudflare Pages 配置文件 - 使用 @cloudflare/next-on-pages

name = "cloudflare-auth-system"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat_v2"]

# Pages 项目配置
# 注意：不要设置 pages_build_output_dir，由 @cloudflare/next-on-pages 自动处理

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "auth-database"
# 部署时请替换为实际的数据库 ID
database_id = "YOUR_D1_DATABASE_ID"

# 环境变量（通过 Cloudflare Dashboard 配置）
# 不要在 wrangler.toml 中硬编码敏感信息
# JWT_SECRET 应通过 Cloudflare Dashboard -> Pages -> Settings -> Environment variables 配置